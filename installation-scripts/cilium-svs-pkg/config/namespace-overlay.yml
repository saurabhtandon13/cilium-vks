#@ load("@ytt:overlay", "overlay")
#@ load("@ytt:data", "data")

#@overlay/match by=overlay.all, expects="1+"
---
#@overlay/match missing_ok=True
metadata:
  namespace: #@ data.values.namespace

#@ # Match the specific specs for AddonRepositoryInstall
#@overlay/match by=overlay.subset({"kind": "AddonRepositoryInstall"})
---
spec:
  addonRepositoryRef:
    namespace: #@ data.values.namespace

#@ # Match the specific specs for AddonInstall
#@overlay/match by=overlay.subset({"kind": "AddonInstall"})
---
spec:
  addonRef:
    #@overlay/match missing_ok=True
    namespace: #@ data.values.namespace
  releaseFilter:
    #@overlay/match missing_ok=True
    ref:
      namespace: #@ data.values.namespace

